name: Daily AI News Digest

on:
  schedule:
    - cron: '0 14 * * *'  # 毎日 23:00 JST (= 14:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  collect-ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Collect AI news
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}  # 任意：設定すればYouTube情報も取得
        run: python scripts/collect_ai_news.py

      - name: Push markdown file via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_STR=$(TZ='Asia/Tokyo' date +'%Y%m%d')
          FILE="${DATE_STR}_aiinfo.md"
          SHA=$(gh api "repos/${{ github.repository }}/contents/$FILE" \
            --jq '.sha' 2>/dev/null || echo "")
          CONTENT=$(base64 -w0 < "$FILE")
          if [ -z "$SHA" ]; then
            gh api "repos/${{ github.repository }}/contents/$FILE" \
              --method PUT \
              -f message="Daily AI digest ${DATE_STR}" \
              -f content="${CONTENT}"
          else
            gh api "repos/${{ github.repository }}/contents/$FILE" \
              --method PUT \
              -f message="Daily AI digest ${DATE_STR} (updated)" \
              -f content="${CONTENT}" \
              -f sha="${SHA}"
          fi
